<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WENS DM BOT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--red:#e8192c;--bg:#0a0a0a;--card:#141414;--border:#2a2a2a;--muted:#888}
body{background:var(--bg);color:#f0f0f0;font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(232,25,44,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,25,44,0.03) 1px,transparent 1px);background-size:40px 40px;z-index:0}
.wrap{position:relative;z-index:1;width:100%;max-width:460px;display:flex;flex-direction:column;align-items:center;gap:24px}
.logo{font-family:'Orbitron',monospace;font-size:2.4rem;font-weight:900;text-align:center}
.logo .w{color:#fff}.logo .r{color:var(--red);text-shadow:0 0 20px rgba(232,25,44,0.5)}
.sub{font-size:0.72rem;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-top:4px;text-align:center}
.line{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);margin:8px auto 0}
.steps{display:flex;gap:6px;width:100%}
.sb{flex:1;height:3px;border-radius:10px;background:var(--border);transition:background 0.3s}
.sb.active{background:var(--red);box-shadow:0 0 6px rgba(232,25,44,0.5)}
.sb.done{background:#b01020}
.card{width:100%;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px 22px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent)}
.ct{font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;margin-bottom:6px}
.cd{font-size:0.88rem;color:var(--muted);margin-bottom:18px;line-height:1.5}
.status{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:18px;font-size:0.88rem}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;transition:all 0.5s}
.dot.on{background:#22c55e;box-shadow:0 0 8px #22c55e;animation:pulse 2s infinite}
.dot.off{background:#ef4444;box-shadow:0 0 8px #ef4444}
@keyframes pulse{0%,100%{box-shadow:0 0 6px #22c55e}50%{box-shadow:0 0 16px #22c55e}}
.lbl{font-size:0.68rem;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;font-weight:600}
.iw{position:relative;margin-bottom:18px}
.px{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--red);font-weight:700}
input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:13px 14px 13px 32px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:1rem;outline:none;transition:all 0.3s}
input::placeholder{color:#444}
input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(232,25,44,0.3)}
.btn{width:100%;background:var(--red);border:none;border-radius:10px;padding:15px;color:#fff;font-family:'Orbitron',monospace;font-size:0.82rem;font-weight:700;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s}
.btn:hover:not(:disabled){background:#ff1f35;transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,25,44,0.4)}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.spin{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{display:none;color:#ff6b7a;font-size:0.82rem;margin-top:8px;padding:8px 12px;background:rgba(232,25,44,0.1);border-radius:8px;border-left:3px solid var(--red)}
.err.show{display:block}
.result{display:none;margin-top:16px;background:rgba(232,25,44,0.06);border:1px solid rgba(232,25,44,0.3);border-radius:10px;padding:16px;text-align:center}
.result.show{display:block}
.rl{font-size:0.68rem;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.code{font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:700;color:var(--red);letter-spacing:6px;text-shadow:0 0 16px rgba(232,25,44,0.5)}
.hint{margin-top:10px;font-size:0.8rem;color:var(--muted);line-height:1.5}
.badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.badge{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:0.78rem;color:#bbb}
.foot{font-size:0.7rem;color:#444;letter-spacing:1px;text-transform:uppercase}
.foot span{color:var(--red);font-weight:600}
</style>
</head>
<body>
<div class="wrap">
<div><div class="logo"><span class="w">WENS </span><span class="r">DM BOT</span></div><div class="sub">Official WhatsApp Bot</div><div class="line"></div></div>
<div class="steps"><div class="sb active" id="s1"></div><div class="sb" id="s2"></div><div class="sb" id="s3"></div></div>
<div class="card">
<div class="ct">Konekte Bot la</div>
<div class="cd">Antre nimewo WhatsApp ou ak kòd peyi pou resevwa pairing code ou.</div>
<div class="status"><div class="dot off" id="dot"></div><div id="stxt">Kap verifye...</div></div>
<div class="lbl">Nimewo WhatsApp</div>
<div class="iw"><span class="px">+</span><input id="phone" type="tel" placeholder="50912345678" maxlength="15" oninput="this.value=this.value.replace(/[^0-9]/g,'')"/></div>
<div class="err" id="err"></div>
<button class="btn" id="btn" onclick="pair()"><span id="bt">MANDE PAIRING CODE</span><div class="spin" id="sp"></div></button>
<div class="result" id="res"><div class="rl">Pairing Code Ou</div><div class="code" id="code">----</div><div class="hint">📱 WhatsApp → Paramèt → Aparèy Konekte → Antre kòd la</div></div>
</div>
<div class="badges"><div class="badge">⚡ Gratis</div><div class="badge">🔒 Sekirite</div><div class="badge">📱 WhatsApp Bot</div><div class="badge">👑 WENS DM</div></div>
<div class="foot">Powered by <span>WENS DM</span> — V1.0.0</div>
</div>
<script>
async function checkStatus(){
  try{const r=await fetch('/status');const d=await r.json();
  const dot=document.getElementById('dot');const t=document.getElementById('stxt');
  if(d.online){dot.className='dot on';t.innerHTML='Bot la <span style="color:#22c55e;font-weight:700">Online</span> — Prè pou konekte'}
  else{dot.className='dot off';t.innerHTML='Bot la <span style="color:#ef4444;font-weight:700">Offline</span> — Kap tann...'}}
  catch{document.getElementById('dot').className='dot off';document.getElementById('stxt').textContent='Pa ka jwenn servè a'}}
async function pair(){
  const phone=document.getElementById('phone').value.trim();
  const err=document.getElementById('err');const res=document.getElementById('res');
  const sp=document.getElementById('sp');const bt=document.getElementById('bt');
  const btn=document.getElementById('btn');const code=document.getElementById('code');
  err.classList.remove('show');res.classList.remove('show');
  if(!phone||phone.length<8){err.textContent='⚠️ Antre yon nimewo valid (ex: 50912345678)';err.classList.add('show');return}
  btn.disabled=true;bt.style.display='none';sp.style.display='block';
  document.getElementById('s1').classList.add('done');document.getElementById('s2').classList.add('active');
  try{const r=await fetch('/pair?phone='+encodeURIComponent(phone));const d=await r.json();
  if(d.success){code.textContent=d.code;document.getElementById('s2').classList.add('done');document.getElementById('s3').classList.add('active');res.classList.add('show')}
  else{err.textContent='❌ '+(d.error||'Erè enkoni');err.classList.add('show');document.getElementById('s2').classList.remove('active')}}
  catch{err.textContent='❌ Pa ka konekte ak servè a';err.classList.add('show')}
  finally{btn.disabled=false;bt.style.display='block';sp.style.display='none'}}
document.getElementById('phone').addEventListener('keydown',e=>{if(e.key==='Enter')pair()});
checkStatus();setInterval(checkStatus,10000);
</script>
</body>
</html>
